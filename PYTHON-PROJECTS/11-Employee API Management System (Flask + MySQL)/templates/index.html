<!DOCTYPE html>
<html>
<head>
    <title>Employee API UI</title>
</head>
<body>

    <h2>Add Employee</h2>

    <input type="text" id="name" placeholder="Name"><br><br>
    <input type="email" id="email" placeholder="Email"><br><br>
    <input type="number" id="salary" placeholder="Salary"><br><br>

    <button onclick="addEmployee()">Add</button>

    <h2>Employees List</h2>
    <button onclick="getEmployees()">Refresh</button>

    <ul id="employeeList"></ul>

<script>
async function addEmployee() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const salary = document.getElementById("salary").value;

    await fetch('/add-employee', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, salary })
    });

    alert("Employee Added");
    getEmployees();
}

async function getEmployees() {
    const res = await fetch('/employees');
    const data = await res.json();

    const list = document.getElementById("employeeList");
    list.innerHTML = "";

    data.data.forEach(emp => {
        const li = document.createElement("li");
        li.innerText = `${emp.id} - ${emp.name} - ${emp.salary}`;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
